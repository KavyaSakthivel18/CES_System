spring.application.name=courseenrollment

spring.datasource.url=jdbc:mysql://${DB_USERNAME}:${DB_PASSWORD}@ces-system-kiot-b53e.d.aivencloud.com:16176/defaultdb?ssl-mode=REQUIRED
